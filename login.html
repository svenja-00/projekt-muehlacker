<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Projekt Mühlacker | Admin</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Basis -->

    <link rel="stylesheet" href="assets/css/base/reset.css">
    <link rel="stylesheet" href="assets/css/base/variables.css">
    <link rel="stylesheet" href="assets/css/base/typography.css">
    <link rel="stylesheet" href="assets/css/base/layout.css">

    <!-- Komponenten -->

    <link rel="stylesheet" href="assets/css/components/buttons.css">
    <link rel="stylesheet" href="assets/css/components/cards.css">

    <!-- Admin -->

    <link rel="stylesheet" href="assets/css/admin/login.css">

</head>

<body>

    <main class="login-page">

        <div class="login-card">

            <img
                src="assets/images/branding/logo.png"
                alt="Projekt Mühlacker"
                class="login-logo">

            <span class="login-tag">

                Projekt Mühlacker

            </span>

            <h1>

                Projektverwaltung

            </h1>

            <p>

                Melde dich an, um Aufgaben, Galerie und Bautagebuch zu verwalten.

            </p>

            <form
                class="login-form"
                id="login-form">

                <div class="form-group">

                    <label for="username">

                        Benutzername

                    </label>

                    <input
                        type="text"
                        id="username"
                        placeholder="Benutzername">

                </div>

                <div class="form-group">

                    <label for="password">

                        Passwort

                    </label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Passwort">

                </div>

                <button
                    type="submit"
                    class="btn-primary">

                    Anmelden

                </button>

            </form>

        </div>

    </main>

    <script src="assets/js/admin/login.js"></script>

</body>
